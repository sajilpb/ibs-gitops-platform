# Default values for nodeapp.

namespaceOverride: default

node:
  name: node
  image: ghcr.io/sajilpb/docker:main
  port: 5000
  targetPort: 5000
  replicaCount: 1
  type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

redis:
  enabled: false
  name: redis
  image: redis:latest
  port: 6379
  replicaCount: 1
  type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  external:
    enabled: true
    enabled: false
    host: ""
    port: 6379
    scheme: redis

nginx:
  name: nginx
  image: nginx:latest
  port: 80
  servicePort: 80
  targetPort: 80
  replicaCount: 1
  type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []
  tls: []

argocd:
  enabled: false
  name: argocd
  nameSpace: argocd
  namespace: argocd
  domainname: argocd.sajil.click
  ingress:
    enabled: false
    annotations: {}
    hosts: []
    tls: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
