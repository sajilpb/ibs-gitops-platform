# Default values for nodeapp.

namespaceOverride: default

node:
  name: node
  image: ghcr.io/sajilpb/docker:main
  port: 5000
  targetPort: 5000
  replicaCount: 1
  type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

redis:
  enabled: false
  name: redis
  image: redis:latest
  port: 6379
  replicaCount: 1
  type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  external:
    enabled: false
    host: ""
    port: 6379
    scheme: redis

db:
  enabled: false
  host: ""
  port: 5432
  name: ""
  secretName: ""
  userKey: username
  passwordKey: password
  hostKey: host
  portKey: port
  nameKey: name
  sslKey: ssl
  ssl: false

nginx:
  name: nginx
  image: nginx:latest
  port: 80
  servicePort: 80
  targetPort: 80
  replicaCount: 1
  type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []
  tls: []

argocd:
  enabled: false
  name: argocd
  nameSpace: argocd
  namespace: argocd
  domainname: argocd.sajil.click
  ingress:
    enabled: false
    annotations: {}
    hosts: []
    tls: []

canary:
  cloudwatch:
    # ALB ARN suffix in CloudWatch dimension format: app/<alb-name>/<id>
    # Get it with: aws elbv2 describe-load-balancers --query "LoadBalancers[?contains(LoadBalancerName,'sharedal')].LoadBalancerArn" --output text | sed 's|.*loadbalancer/||'
    # When empty, canary analysis steps are skipped (rollout still proceeds via pause steps)
    albArnSuffix: ""

externalSecrets:
  enabled: false
  awsSecretName: ""
  refreshInterval: 1h
  clusterSecretStore:
    create: false
    name: aws-secrets-manager
    region: us-east-1
    serviceAccountName: external-secrets
    serviceAccountNamespace: external-secrets

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
