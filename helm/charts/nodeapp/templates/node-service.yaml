apiVersion: v1
kind: Service
metadata:
  name: node
  labels:
    {{- include "nodeapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.node.type }}
  ports:
    - port: {{ .Values.node.port }}
      targetPort: {{ .Values.node.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: node
