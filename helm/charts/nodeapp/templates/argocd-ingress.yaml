{{- if .Values.argocd.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.argocd.name | default "argocd" }}
  namespace: {{ .Values.argocd.namespace | default "argocd" }}
  labels:
    {{- include "nodeapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: argocd-ingress
  {{- with .Values.argocd.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.argocd.ingress.className | default "alb" }}
  rules:
    {{- range .Values.argocd.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .backend.service.name }}
                port:
                  number: {{ .backend.service.port.number }}
          {{- end }}
    {{- end }}
  {{- if .Values.argocd.ingress.tls }}
  tls:
    {{- toYaml .Values.argocd.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
