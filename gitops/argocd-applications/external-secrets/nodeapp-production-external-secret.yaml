apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nodeapp-db-secret
  namespace: nodeapp-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: nodeapp-db-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: nodeapp-db-credentials-v3
